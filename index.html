<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agrinho 2026</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

    <header>

        <img
            src="agrinho.png"
            class="banner"
            alt="Personagens do Agrinho">

        <h1>AGRINHO 2026</h1>

        <p>
            Sustentabilidade e Meio Ambiente
        </p>

    </header>


    <section class="curiosidade">

        <h2>🌎 Curiosidade Verde</h2>

        <p id="curiosidadeTexto"></p>

    </section>


    <section class="progresso">

        <div class="barra">

            <div id="preenchimento"></div>

        </div>

        <span id="contador">
            1/8
        </span>

    </section>


    <main>

        <div id="flashcard">

            <h2 id="pergunta"></h2>

            <button id="mostrarResposta">
                Mostrar resposta
            </button>

            <p id="resposta"></p>


            <div id="acoes">

                <button class="acerto">
                    ✅ Acertei
                </button>

                <button class="erro">
                    ❌ Errei
                </button>

            </div>


            <div id="comentario">

                <strong>Dica Ambiental:</strong>

                <p id="textoComentario"></p>

            </div>

        </div>


        <div id="final">

            <h2>🌱 Parabéns!</h2>

            <p id="pontuacaoFinal"></p>

        </div>

    </main>


    <script src="script.js"></script>

</body>

</html>
